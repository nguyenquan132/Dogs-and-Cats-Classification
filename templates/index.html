<!DOCTYPE html>
<html>
<head>
    <title>Cat vs Dog Classification</title>
<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 900px;
        margin: 40px auto;
        text-align: center;
    }

    .card {
        border: 2px solid #ddd;
        border-radius: 12px;
        padding: 20px;
        margin-top: 20px;

        display: flex;
        gap: 20px;

        min-height: 350px;
    }

    .image-section {
        flex: 1;

        display: flex;
        justify-content: center;
        align-items: center;
    }

    .result-section {
        flex: 1;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        border-left: 1px solid #ddd;
    }

    #preview {
        max-width: 100%;
        max-height: 300px;

        border-radius: 8px;
    }

    #prediction {
        font-size: 40px;
        font-weight: bold;
    }

    #confidence {
        font-size: 24px;
        margin-top: 10px;
        color: #666;
    }

    button {
        margin-top: 15px;
        padding: 10px 20px;
        cursor: pointer;
    }

</style>
</head>
<body>
<h1>Cat vs Dog Classification</h1>
<input type="file" id="imageInput">
<button onclick="predict()">
    Predict
</button>
<div class="card">
    <div class="image-section">
        <img id="preview" alt="Preview">
    </div>

    <div class="result-section">
        <div id="prediction">
            Waiting...
        </div>
        <div id="confidence">
        </div>
    </div>
</div>
<script>

    async function predict() {
        const file =
            document.getElementById("imageInput")
            .files[0];

        if (!file) {
            alert("Please select an image");
            return;
        }
        document.getElementById("preview").src =
            URL.createObjectURL(file);

        const formData = new FormData();

        formData.append(
            "file",
            file
        );

        try {
            const response = await fetch(
                "/predict",
                {
                    method: "POST",
                    body: formData
                }
            );
            if (!response.ok) {
                throw new Error("Prediction failed");
            }
            const result = await response.json();

            document.getElementById("prediction")
                .innerText = result.prediction.toUpperCase();

            document.getElementById("confidence")
                .innerText = `Confidence: ${result.confidence}%`;
        } catch (error) {

            alert(error.message);
}
    }
</script>
</body>
</html>
